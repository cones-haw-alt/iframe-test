<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP İçerik</title>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: "Segoe UI", sans-serif;
    background:#000;
    padding:0;
    margin:0;
  }

  .vip-wrapper {
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .vip-wrapper img {
    width:100%;
    height:100%;
    object-fit:cover;
    filter:blur(4px) brightness(0.6);
    border-radius:20px;
  }

  .vip-overlay {
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:clamp(20px, 4vw, 40px);
    gap:clamp(15px, 3vw, 25px);
  }

  .premium-badge {
    background:linear-gradient(135deg,#EC4899,#DB2777);
    padding:clamp(6px, 1.5vw, 12px) clamp(14px, 3vw, 24px);
    border-radius:30px;
    font-size:clamp(12px, 2.5vw, 18px);
    color:#fff;
    font-weight:700;
    letter-spacing:1px;
  }

  .vip-lock-icon {
    width:clamp(70px, 15vw, 120px);
    height:clamp(70px, 15vw, 120px);
    border-radius:50%;
    background:linear-gradient(135deg,#EC4899,#DB2777);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 40px rgba(236,72,153,0.5);
  }

  .vip-lock-icon svg {
    width:clamp(35px, 7vw, 55px);
    height:clamp(35px, 7vw, 55px);
    fill:#fff;
  }

  /* --- BURASI SORUNU ÇÖZEN KISIM --- */
  .vip-text {
    color:#fff;
    font-size:clamp(14px, 3.5vw, 22px);
    max-width:90%;
    line-height:1.4;
    white-space: nowrap;      /* >>> TEK SATIR GARANTİ <<< */
  }

  .vip-text strong {
    color:#F472B6;
  }

  .vip-btn {
    padding:clamp(12px,3vw,16px) clamp(26px,6vw,40px);
    font-size:clamp(13px,3vw,18px);
    border-radius:50px;
    background:linear-gradient(135deg,#EC4899,#DB2777);
    color:#fff;
    text-decoration:none;
    font-weight:600;
    letter-spacing:1px;
    box-shadow:0 6px 25px rgba(236,72,153,0.3);
    transition:0.2s;
  }

  .vip-btn:hover { transform:translateY(-3px); }
</style>

</head>
<body>

<div class="vip-wrapper">
  <img src="https://utanmazkizlar.com/wp-content/uploads/2025/11/suriyeli-sevgililer-gaziantep-tekstil-deposuna-kacamak-yapiyor.jpg">

  <div class="vip-overlay">

    <div class="premium-badge">⭐ Premium İçerik</div>

    <div class="vip-lock-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 
        10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 
        5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38
        -1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01
        .22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07
        -.2-.08-.06-.19-.04-.27-.02-.12.03-1.99 1.27-5.62 
        3.72-.53.36-1.01.54-1.44.53-.47-.01-1.38-.27-2.05
        -.49-.82-.27-1.47-.42-1.42-.88.03-.24.37-.48 1.02
        -.73 3.99-1.73 6.65-2.87 7.98-3.43 3.8-1.58 4.59-1.85
        5.1-1.86.11 0 .37.03.54.16.14.11.18.26.2.37.01.08.03
        .29.01.45z"/>
      </svg>
    </div>

    <div class="vip-text">
      Bu içeriği görmek için <strong>Telegram VIP</strong> üyeliği gereklidir.
    </div>

    <a href="https://t.me/YOURUSERNAME" class="vip-btn" target="_blank">
      Telegram'dan VIP Ol
    </a>

  </div>
</div>

</body>
</html>
